<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>King's Guard — RG Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F1F5F9; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", "Segoe UI", Roboto, sans-serif; color: #0F172A; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.5); border: 2px solid transparent; background-clip: padding-box; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="date-range-picker.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="player-list.jsx"></script>
<script type="text/babel" src="player-detail.jsx"></script>
<script type="text/babel" src="population-risk.jsx"></script>
<script type="text/babel" src="interaction-log.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "showSpeakerNotes": false
}/*EDITMODE-END*/;

function App() {
  const [brand, setBrand] = useState('betking');
  const [country, setCountry] = useState('NG');
  const [dateRange, setDateRange] = useState('7d');
  const [customRange, setCustomRange] = useState(null);
  const [activeView, setActiveView] = useState('home');
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Sync country with brand
  useEffect(() => {
    if (brand === 'betking' && country !== 'NG' && country !== 'ALL') setCountry('NG');
    if (brand === 'supersportbet' && country === 'NG') setCountry('ZA');
  }, [brand]);

  const handlePlayerClick = (id) => {
    setSelectedPlayer(id);
    setActiveView('player-detail');
  };

  let body;
  if (activeView === 'home') {
    body = <HomeDashboard brand={brand} country={country} dateRange={dateRange} customRange={customRange} onPlayerClick={handlePlayerClick} />;
  } else if (activeView === 'players') {
    body = <PlayerList brand={brand} country={country} range={dateRange} onPlayerClick={handlePlayerClick} />;
  } else if (activeView === 'player-detail') {
    body = <PlayerDetail playerId={selectedPlayer} onBack={() => setActiveView('players')} />;
  } else {
    body = (
      <div style={{ padding: 24 }}>
        <div style={{ ...cardStyle, padding: 40, textAlign: 'center', color: '#94A3B8' }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: '#475569', marginBottom: 6 }}>{activeView.charAt(0).toUpperCase() + activeView.slice(1)}</div>
          <div style={{ fontSize: 12 }}>Section scaffolded — primary working screens are <strong>Dashboard</strong> and <strong>Player List</strong>.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar brand={brand} setBrand={setBrand} country={country} setCountry={setCountry} dateRange={dateRange} setDateRange={setDateRange} customRange={customRange} setCustomRange={setCustomRange} lastRefresh="3h ago" />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar activeView={activeView === 'player-detail' ? 'players' : activeView} setActiveView={(v) => { setActiveView(v); setSelectedPlayer(null); }} brand={brand} country={country} dateRange={dateRange} />
        <div style={{ flex: 1, overflow: 'auto', background: '#F1F5F9' }}>
          {body}
        </div>
      </div>

      <TweaksPanel title="King's Guard tweaks">
        <TweakSection title="View">
          <TweakRadio label="Active screen" value={activeView === 'player-detail' ? 'players' : activeView} onChange={(v) => { setActiveView(v); setSelectedPlayer(null); }} options={[
            { value: 'home', label: 'Dashboard' },
            { value: 'players', label: 'Player list' },
          ]} />
          <TweakButton onClick={() => handlePlayerClick('BK-4827193')}>Open sample player profile →</TweakButton>
        </TweakSection>
        <TweakSection title="Brand & market">
          <TweakRadio label="Brand" value={brand} onChange={setBrand} options={[
            { value: 'betking', label: 'BetKing' },
            { value: 'supersportbet', label: 'SuperSportBet' },
          ]} />
          <TweakSelect label="Country" value={country} onChange={setCountry} options={[
            { value: 'ALL', label: 'All markets' },
            { value: 'NG', label: 'Nigeria' },
            { value: 'ZA', label: 'South Africa' },
            { value: 'ZM', label: 'Zambia' },
          ]} />
          <TweakSelect label="Date range" value={dateRange} onChange={setDateRange} options={[
            { value: '7d', label: 'Last 7 days' },
            { value: '14d', label: 'Last 14 days' },
            { value: '30d', label: 'Last 30 days' },
          ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
