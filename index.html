// ===== Date-range-aware data generator =====
// Returns coherent mock data sized & shaped for the chosen window.

// Monthly active users by market (mock baseline) — irregular figures
// matching how real measurements come out, not round 900k/400k/100k.
const MAU = {
  betking:       { NG: 883718 },
  supersportbet: { ZA: 392446, ZM:  97812 },
};
const MAU_TOTALS = {
  betking:       883718,
  supersportbet: 490258,
  all:          1373976,
};

// Risk-population shares (per-market % of MAU). Every MAU gets classified —
// the four buckets sum to 1.0 so the total monitored = MAU.
// High ~0.6%, Medium ~3.5%, Low ~93%, Unrated ~3% (no monitoring history yet)
const RISK_SHARE = { high: 0.006, med: 0.035, low: 0.929, unrated: 0.030 };

// Deposit ARPU per month (NGN for BetKing, ZAR for SuperSportBet)
const MONTHLY_ARPU = {
  betking:       11500, // NGN per MAU per month
  supersportbet: 165,   // ZAR per MAU per month (blended ZA+ZM)
};

function mauForBrand(brandKey) {
  if (brandKey === 'betking' || brandKey === 'supersportbet') return MAU_TOTALS[brandKey];
  return MAU_TOTALS.all;
}

function buildBaseDist(brandKey) {
  const mau = mauForBrand(brandKey);
  return {
    high:    Math.round(mau * RISK_SHARE.high),
    med:     Math.round(mau * RISK_SHARE.med),
    low:     Math.round(mau * RISK_SHARE.low),
    unrated: Math.round(mau * RISK_SHARE.unrated),
  };
}

// activeMul = active-base multiplier vs MAU baseline (30d window).
//   7d  ≈ 0.55 — weekly actives are ~55% of monthly actives (typical retention curve)
//   14d ≈ 0.78
//   30d  = 1.00 — the MAU definition
//   90d ≈ 1.42 — quarterly actives (broader coverage of returning users)
//   ytd ≈ 1.68 — year-to-date actives (May 5 → ~125 days)
// activeUnit / activeUnitFull = the metric label that fits the window.
const RANGE_CONFIG = {
  '7d':  { days: 7,   label: '7 days',       pointStep: 1, distMul: 1.00, depositMul: 0.25,  activeMul: 0.55, activeUnit: 'WAU',  activeUnitFull: 'weekly active users',     deltaLabel: 'vs prior 7d',     refreshLabel: 'daily',  trendStart: 0.95, trendGrowth: 0.23 },
  '14d': { days: 14,  label: '14 days',      pointStep: 2, distMul: 1.00, depositMul: 0.50,  activeMul: 0.78, activeUnit: '14dAU', activeUnitFull: '14-day active users',    deltaLabel: 'vs prior 14d',    refreshLabel: 'daily',  trendStart: 0.92, trendGrowth: 0.40 },
  '30d': { days: 30,  label: '30 days',      pointStep: 3, distMul: 1.00, depositMul: 1.05,  activeMul: 1.00, activeUnit: 'MAU',  activeUnitFull: 'monthly active users',    deltaLabel: 'vs prior 30d',    refreshLabel: 'daily',  trendStart: 0.85, trendGrowth: 0.81 },
  '90d': { days: 90,  label: '90 days',      pointStep: 7, distMul: 1.00, depositMul: 3.06,  activeMul: 1.42, activeUnit: 'QAU',  activeUnitFull: 'quarterly active users',  deltaLabel: 'vs prior 90d',    refreshLabel: 'weekly', trendStart: 0.70, trendGrowth: 1.30 },
  'ytd': { days: 124, label: 'year to date', pointStep: 10,distMul: 1.00, depositMul: 4.22,  activeMul: 1.68, activeUnit: 'YTD',  activeUnitFull: 'year-to-date active users', deltaLabel: 'vs prior period', refreshLabel: 'weekly', trendStart: 0.62, trendGrowth: 1.80 },
};

// Deterministic pseudo-random
function seeded(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

function buildRangeData(rangeKey, brandKey) {
  const cfg = RANGE_CONFIG[rangeKey] || RANGE_CONFIG['7d'];
  const rnd = seeded(rangeKey.charCodeAt(0) * 17 + (brandKey || '').length);

  // Brand-scoped MAU + distribution.
  // mauBase is the 30-day MAU baseline; mau is the active-base for THIS window.
  const mauBase = mauForBrand(brandKey);
  const mau = Math.round(mauBase * cfg.activeMul);
  const baseDist = buildBaseDist(brandKey);
  // Risk buckets sum to the active base (mau), so they scale with activeMul too.
  const dist = {
    high:    Math.round(baseDist.high    * cfg.distMul * cfg.activeMul),
    med:     Math.round(baseDist.med     * cfg.distMul * cfg.activeMul),
    low:     Math.round(baseDist.low     * cfg.distMul * cfg.activeMul),
    unrated: Math.round(baseDist.unrated * cfg.distMul * cfg.activeMul),
  };

  // Deposit totals scaled from monthly ARPU
  const depositTotal   = Math.round(MAU_TOTALS.betking       * MONTHLY_ARPU.betking       * cfg.depositMul);
  const depositTotalSS = Math.round(MAU_TOTALS.supersportbet * MONTHLY_ARPU.supersportbet * cfg.depositMul);

  // Risk-distribution trend, sized to range with ~8 points
  const numPoints = Math.min(Math.max(Math.ceil(cfg.days / cfg.pointStep), 6), 14);
  const today = new Date(2026, 4, 5); // May 5
  const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtDate = (d) => `${monthShort[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}`;

  // Risk-distribution trend with real customer migration between buckets.
  // High-risk grows over the period (the headline story). Medium oscillates
  // — players migrate down from high (cooling off) AND up from low (warming up),
  // so the bucket sees both inflow + outflow turbulence. Low erodes as
  // engagement creeps up. Total monitored stays roughly flat (same population
  // reclassifying). We build per-period "migration impulses" so the lines
  // actually move against each other instead of all rising together.
  const trend = [];
  const endHigh = dist.high;
  const endMed  = dist.med;
  const endLow  = dist.low;
  const startHigh = Math.round(endHigh * cfg.trendStart);
  const startMed  = Math.round(endMed * 1.06);   // medium was higher, has shed players upward
  // Conserve total: startLow absorbs what High and Med gained, keeping stacked total == current total
  const startLow  = (endHigh + endMed + endLow) - startHigh - startMed;

  // Migration impulses — discrete events where players move between buckets.
  // Each impulse is { atT: 0..1, fromBucket, toBucket, magnitude (fraction of bucket) }
  // We seed a handful so the chart shows visible "pulses" of movement.
  const impulses = [
    { atT: 0.15, from: 'low',  to: 'med',  mag: 0.04 }, // recreational players warming up
    { atT: 0.28, from: 'med',  to: 'high', mag: 0.05 }, // first wave escalates
    { atT: 0.42, from: 'high', to: 'med',  mag: 0.03 }, // some cool down (outreach worked)
    { atT: 0.55, from: 'low',  to: 'med',  mag: 0.05 }, // weekend warm-up
    { atT: 0.70, from: 'med',  to: 'high', mag: 0.06 }, // bigger escalation wave
    { atT: 0.85, from: 'med',  to: 'low',  mag: 0.03 }, // some self-correct
    { atT: 0.92, from: 'low',  to: 'med',  mag: 0.04 }, // late-window churn
  ];

  // Evaluate all three buckets together so migrations conserve the total population.
  // Each impulse uses the FROM bucket's reference size for both sides of the transfer,
  // ensuring every player moved out of one bucket is moved into another.
  const starts = { high: startHigh, med: startMed, low: startLow };
  const ends   = { high: endHigh,   med: endMed,   low: endLow };

  const evalPoint = (t) => {
    const eased = t * t * (3 - 2 * t);
    const v = {
      high: starts.high + (ends.high - starts.high) * eased,
      med:  starts.med  + (ends.med  - starts.med)  * eased,
      low:  starts.low  + (ends.low  - starts.low)  * eased,
    };
    for (const imp of impulses) {
      const sigma = 0.07;
      const bump = Math.exp(-Math.pow((t - imp.atT) / sigma, 2));
      // Use FROM bucket's scale so delta is identical on both sides
      const refSize = Math.max(starts[imp.from], ends[imp.from], 1);
      const delta = imp.mag * refSize * bump;
      v[imp.from] -= delta;
      v[imp.to]   += delta;
    }
    // Tiny symmetric jitter: shift between low↔med only (keeps total constant)
    const jitter = (rnd() - 0.5) * 0.002 * Math.max(starts.med, ends.med);
    v.low -= jitter;
    v.med += jitter;
    return {
      high: Math.max(0, Math.round(v.high)),
      med:  Math.max(0, Math.round(v.med)),
      low:  Math.max(0, Math.round(v.low)),
    };
  };

  for (let i = 0; i < numPoints; i++) {
    const t = i / (numPoints - 1);
    const d = new Date(today);
    d.setDate(today.getDate() - Math.round((1 - t) * cfg.days));
    trend.push({ d: fmtDate(d), ...evalPoint(t) });
  }
  // Force final point to land exactly on the live distribution
  trend[trend.length - 1] = {
    d: trend[trend.length - 1].d,
    high: endHigh, med: endMed, low: endLow,
  };

  // Deposit bars — one per day in range
  const numBars = cfg.days;
  const deposits = [];
  for (let i = 0; i < numBars; i++) {
    const t = i / (numBars - 1);
    const base = 35 + t * 70;
    const wobble = Math.sin(i * 0.5) * 8 + (rnd() - 0.5) * 12;
    const spike = i >= numBars - 7 ? 12 : 0;
    deposits.push(Math.max(20, Math.round(base + wobble + spike)));
  }

  // Top movers — pulled directly from PLAYERS list so the dashboard
  // and player list reference the exact same records.
  const moverScale = rangeKey === '7d' ? 1 : rangeKey === '14d' ? 1.2 : rangeKey === '30d' ? 1.5 : rangeKey === '90d' ? 1.9 : 2.2;
  const movers = ['BK-4827193', 'SS-7283910', 'BK-3918274', 'BK-5621847', 'SS-9012384']
    .map(id => PLAYERS.find(p => p.id === id))
    .filter(Boolean)
    .map(p => {
      const baseDelta = (p.riskScore || 0) - (p.riskFrom || 0);
      const delta = Math.round(baseDelta * moverScale);
      return {
        id: p.id, brand: p.brand, country: p.country,
        from: p.riskFrom, to: Math.min(99, (p.riskFrom || 0) + delta),
        delta,
      };
    });

  // RG tool adoption — scales with MAU and window
  const rgScale = (mau / 1000000) * cfg.depositMul;
  const rgAdoption = [
    { tool: 'Self-Exclusion',   base: 41200, deltaBase: 11 },
    { tool: 'Deposit Limits',   base: 33000, deltaBase: 18 },
    { tool: '24-Hour Cool-Off', base: 16500, deltaBase: 24 },
    { tool: 'Account Closure',  base: 8250,  deltaBase: 6  },
  ].map(i => ({
    tool: i.tool,
    count: Math.max(1, Math.round(i.base * rgScale)),
    delta: i.deltaBase + (rangeKey === '90d' || rangeKey === 'ytd' ? 5 : 0)
  }));

  // Risk signals — proportional to high+med population
  const signalScale = (dist.high + dist.med) / 2631; // 2631 = baseline all-brand 7d (high+med)
  const signals = [
    { label: 'Spend spike (>50% w/w)',     base: 142, color: '#DC2626' },
    { label: 'Rapid re-deposit',           base: 87,  color: '#DC2626' },
    { label: 'Loss-chasing pattern',       base: 71,  color: '#DC2626' },
    { label: 'Deposit frequency surge',    base: 68,  color: '#D97706' },
    { label: 'Multiple deposits/session',  base: 54,  color: '#D97706' },
    { label: 'Failed deposit attempts',    base: 41,  color: '#D97706' },
    { label: 'Late-night activity shift',  base: 38,  color: '#D97706' },
    { label: 'Sports → Casino shift',      base: 29,  color: '#D97706' },
    { label: 'Session length spike',       base: 22,  color: '#D97706' },
    { label: 'Withdrawal reversal',        base: 16,  color: '#D97706' },
  ].map(s => ({ label: s.label, color: s.color, count: Math.max(1, Math.round(s.base * signalScale)) }));

  // Stat-card deltas (vs yesterday on 7d, vs prior period on longer windows)
  const dailyVs = rangeKey === '7d' ? 'vs yesterday' : 'vs prior period';
  const dHigh = Math.round(dist.high * (rangeKey === '7d' ? 0.025 : rangeKey === '14d' ? 0.06 : rangeKey === '30d' ? 0.18 : rangeKey === '90d' ? 0.34 : 0.42));
  const dMed  = Math.round(dist.med  * (rangeKey === '7d' ? 0.018 : rangeKey === '14d' ? 0.06 : rangeKey === '30d' ? 0.20 : rangeKey === '90d' ? 0.30 : 0.36));
  const dLow  = Math.round(dist.low  * (rangeKey === '7d' ? 0.003 : rangeKey === '14d' ? 0.010 : rangeKey === '30d' ? 0.022 : rangeKey === '90d' ? 0.13 : 0.17));
  const sign = (n, dir) => `${dir === 'down' ? '−' : '+'}${n.toLocaleString()}`;
  const statDeltas = {
    high: sign(dHigh, 'up'),
    med:  sign(dMed,  'up'),
    low:  rangeKey === '7d' || rangeKey === '14d' || rangeKey === '30d' ? sign(dLow, 'down') : sign(dLow, 'up'),
    dailyVs,
  };

  // Deposit % vs prior
  const depositGrowth = rangeKey === '7d' ? 14.2 : rangeKey === '14d' ? 17.8 : rangeKey === '30d' ? 24.6 : rangeKey === '90d' ? 38.4 : 47.2;

  return {
    rangeKey,
    rangeLabel: cfg.label,
    trendGrowthPct: Math.round(cfg.trendGrowth * 100),
    deltaLabel: cfg.deltaLabel,
    refreshLabel: cfg.refreshLabel,
    mau,
    mauBase,
    activeUnit: cfg.activeUnit,
    activeUnitFull: cfg.activeUnitFull,
    dist,
    depositTotal,
    depositTotalSS,
    depositGrowth,
    trend,
    deposits,
    movers,
    rgAdoption,
    signals,
    statDeltas,
  };
}

// ===== Full population synthesizer =====
// PLAYERS holds ~28 hand-crafted records (top movers, attention queue, named cases).
// The full risk universe is FAR larger — buildRangeData() returns counts in the
// thousands per bucket. We synthesize the rest of the list deterministically so
// the player list can show every player across high / medium / low / unrated.
//
// Strategy:
//   - Hand-crafted records are pinned to the top of every bucket
//   - Synthetic records fill the remainder of each bucket up to the dashboard count
//   - All synthetic records are generated deterministically from a seed, so paging
//     is stable and the same record appears in the same place every render

const SIGNAL_LIBRARY = [
  'Spend spike (>50% w/w)', 'Rapid re-deposit', 'Deposit frequency surge',
  'Multiple deposits/session', 'Failed deposit attempts',
  'Late-night activity shift', 'Sports → Casino shift',
];

const INSIGHT_LIBRARY = {
  high: [
    'Spend up sharply vs prior period',
    'Multiple re-deposits within session',
    'Removed deposit limit, activity surged',
    'Late-night sessions extending past 3 hours',
    'Deposit frequency 3× baseline',
    'Cross-product migration with rising stakes',
    'Velocity exceeds 95th percentile peer cohort',
    'Failed deposit attempts followed by retries',
  ],
  medium: [
    'Modest spend increase, watching trajectory',
    'Bet frequency rising vs 28-day baseline',
    'Casino exposure trending up',
    'Session length growing week-over-week',
    'New deposit method added recently',
    'Off-hours activity modestly elevated',
    'Cross-product activity expanding',
  ],
  low: [
    'Stable engagement within range',
    'Recreational pattern, no flags',
    'Trending down vs prior period',
    'Consistent low-frequency play',
    'Reduced activity following self-set limit',
    'Cooled off after session reminder',
    'Below cohort average on all signals',
  ],
  unrated: [
    'Insufficient history — model recalibrating',
    'New account — under 7 days observed',
    'Returning player — fresh observation window',
    'KYC complete, behaviour baseline pending',
  ],
};

const COUNTRIES_BY_BRAND = {
  betking: ['NG'],
  supersportbet: ['ZA', 'ZA', 'ZA', 'ZA', 'ZM'], // ZA-weighted (392k vs 97k)
};

const PRODUCTS_LIBRARY = [
  ['Sports'], ['Sports'], ['Sports'], ['Sports', 'Casino'], ['Casino'],
  ['Sports', 'Virtuals'], ['Casino', 'Virtuals'], ['Sports', 'Casino', 'Virtuals'],
];

const TRENDS = { high: ['up','up','up','up','stable'], medium: ['up','up','stable','stable','down'], low: ['stable','stable','down','down','up'], unrated: [null] };

// Generate a synthetic player at index i within bucket+brand
function synthPlayer(brandKey, bucket, i, seed) {
  const rnd = seeded(seed + i * 31);
  const idPrefix = brandKey === 'betking' ? 'BK' : 'SS';
  const idNum = 1000000 + Math.floor(rnd() * 8999999);
  const country = COUNTRIES_BY_BRAND[brandKey][Math.floor(rnd() * COUNTRIES_BY_BRAND[brandKey].length)];

  const score = bucket === 'high' ? Math.floor(70 + rnd() * 30)
              : bucket === 'medium' ? Math.floor(40 + rnd() * 30)
              : bucket === 'low' ? Math.floor(5 + rnd() * 35)
              : null;

  const trend = TRENDS[bucket][Math.floor(rnd() * TRENDS[bucket].length)];

  // Spend by brand (NGN vs ZAR scale)
  const baseSpend = brandKey === 'betking' ? 1 : 0.014; // ~71x ratio NGN:ZAR
  const spendByBucket = bucket === 'high' ? 400000 + rnd() * 1500000
                      : bucket === 'medium' ? 80000 + rnd() * 350000
                      : bucket === 'low' ? 5000 + rnd() * 95000
                      : 1000 + rnd() * 20000;
  const spend = Math.round(spendByBucket * baseSpend);

  const spendDelta = bucket === 'high' ? Math.floor(50 + rnd() * 180)
                   : bucket === 'medium' ? Math.floor(15 + rnd() * 50)
                   : bucket === 'low' ? Math.floor(-30 + rnd() * 25)
                   : null;

  const deposits = bucket === 'high' ? Math.floor(6 + rnd() * 12)
                 : bucket === 'medium' ? Math.floor(3 + rnd() * 5)
                 : bucket === 'low' ? Math.floor(1 + rnd() * 4)
                 : Math.floor(1 + rnd() * 2);

  const bets = bucket === 'high' ? Math.floor(80 + rnd() * 350)
             : bucket === 'medium' ? Math.floor(30 + rnd() * 80)
             : bucket === 'low' ? Math.floor(5 + rnd() * 40)
             : Math.floor(2 + rnd() * 8);

  // Last-active distribution by bucket
  const lastActiveOptions = bucket === 'high' ? ['12m ago','34m ago','1h ago','2h ago','3h ago','5h ago']
                          : bucket === 'medium' ? ['1h ago','3h ago','5h ago','8h ago','12h ago','18h ago']
                          : bucket === 'low' ? ['1d ago','2d ago','3d ago','4d ago','5d ago']
                          : ['4d ago','5d ago','6d ago','7d ago'];
  const lastActive = lastActiveOptions[Math.floor(rnd() * lastActiveOptions.length)];

  // Signals — high gets 1-3, medium gets 0-2, low/unrated none
  const numSignals = bucket === 'high' ? 1 + Math.floor(rnd() * 3)
                   : bucket === 'medium' ? Math.floor(rnd() * 3)
                   : 0;
  const signals = [];
  const used = new Set();
  for (let s = 0; s < numSignals; s++) {
    const idx = Math.floor(rnd() * SIGNAL_LIBRARY.length);
    if (!used.has(idx)) {
      used.add(idx);
      signals.push(SIGNAL_LIBRARY[idx]);
    }
  }

  const insightArr = INSIGHT_LIBRARY[bucket];
  const insight = insightArr[Math.floor(rnd() * insightArr.length)];

  const products = PRODUCTS_LIBRARY[Math.floor(rnd() * PRODUCTS_LIBRARY.length)];

  // Status — high has ~30% chance of outreach/monitor, medium ~10%, others none
  let status = null;
  if (bucket === 'high') {
    const r = rnd();
    status = r < 0.18 ? 'outreach' : r < 0.45 ? 'monitor' : null;
  } else if (bucket === 'medium') {
    status = rnd() < 0.10 ? 'monitor' : null;
  }

  // Tiers 1-9: 1=lowest stake, 9=VIP
  const tier = bucket === 'high'   ? 5 + Math.floor(rnd() * 5)              // 5-9
             : bucket === 'medium' ? 3 + Math.floor(rnd() * 4)              // 3-6
             : bucket === 'low'    ? 1 + Math.floor(rnd() * 4)              // 1-4
             : 1 + Math.floor(rnd() * 2);                                   // 1-2 (unrated)

  return {
    id: `${idPrefix}-${idNum}`,
    risk: bucket,
    riskScore: score,
    trend,
    spend,
    spendDelta,
    deposits,
    bets,
    lastActive,
    insight,
    signals,
    country,
    brand: brandKey,
    tier,
    products,
    status,
    synthetic: true,
  };
}

// Bucket counts per brand at the active-base for the given range.
// These line up with what buildRangeData() shows on the dashboard.
function bucketCountsForBrand(brandKey, rangeKey) {
  const cfg = RANGE_CONFIG[rangeKey] || RANGE_CONFIG['7d'];
  const baseDist = buildBaseDist(brandKey);
  return {
    high:    Math.round(baseDist.high    * cfg.activeMul),
    medium:  Math.round(baseDist.med     * cfg.activeMul),
    low:     Math.round(baseDist.low     * cfg.activeMul),
    unrated: Math.round(baseDist.unrated * cfg.activeMul),
  };
}

// Hand-crafted PLAYERS, partitioned by brand+bucket (so we can pin them at the top)
function pinnedByBrandBucket(brandKey, bucket) {
  return PLAYERS.filter(p => p.brand === brandKey && p.risk === bucket);
}

// Returns a *virtual* list — has length, supports get(i) and slice(start, end).
// Synthetic rows are generated lazily so we never materialize 800k objects.
function getPlayerPopulation(brandKey, rangeKey) {
  const brands = brandKey === 'all' ? ['betking', 'supersportbet'] : [brandKey];
  const buckets = ['high', 'medium', 'low', 'unrated'];

  // Build segment table: each segment is { brand, bucket, pinned: [...], synthCount, total }
  const segments = [];
  for (const b of buckets) {
    for (const br of brands) {
      const counts = bucketCountsForBrand(br, rangeKey);
      const pinned = pinnedByBrandBucket(br, b);
      const total = counts[b];
      const synthCount = Math.max(0, total - pinned.length);
      segments.push({ brand: br, bucket: b, pinned, synthCount, total });
    }
  }

  // Cumulative offsets for index→segment lookup
  let cum = 0;
  const offsets = segments.map(s => {
    const start = cum;
    cum += s.pinned.length + s.synthCount;
    return { start, end: cum, seg: s };
  });
  const length = cum;

  // Cache synthetic records by (brand, bucket, i)
  const cache = new Map();

  function get(i) {
    for (const o of offsets) {
      if (i < o.end) {
        const localIdx = i - o.start;
        if (localIdx < o.seg.pinned.length) return o.seg.pinned[localIdx];
        const synthIdx = localIdx - o.seg.pinned.length;
        const cacheKey = `${o.seg.brand}|${o.seg.bucket}|${synthIdx}`;
        if (!cache.has(cacheKey)) {
          // Seed includes brand+bucket+rangeKey so synthetic IDs are stable
          const seed = (o.seg.brand.charCodeAt(0) * 7919 + o.seg.bucket.charCodeAt(0) * 31 + rangeKey.charCodeAt(0)) * 100000 + synthIdx;
          cache.set(cacheKey, synthPlayer(o.seg.brand, o.seg.bucket, synthIdx, seed));
        }
        return cache.get(cacheKey);
      }
    }
    return null;
  }

  function slice(start, end) {
    const out = [];
    for (let i = start; i < Math.min(end, length); i++) out.push(get(i));
    return out;
  }

  function bucketCounts() {
    const out = { high: 0, medium: 0, low: 0, unrated: 0 };
    for (const s of segments) out[s.bucket] += s.total;
    return out;
  }

  return { length, get, slice, segments, bucketCounts };
}

window.KGData = { PLAYERS, buildRangeData, RANGE_CONFIG, MAU, MAU_TOTALS, getPlayerPopulation, bucketCountsForBrand };

function Sparkline({ data, color = '#0F172A', height = 28, width = 96, fill = true }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 2) - 1;
    return [x, y];
  });
  const path = points.map((p, i) => (i === 0 ? `M ${p[0]},${p[1]}` : `L ${p[0]},${p[1]}`)).join(' ');
  const area = `${path} L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: 'block', overflow: 'visible' }}>
      {fill && <path d={area} fill={color} fillOpacity="0.08" />}
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

    case 'filter': return <svg {...props}><path d="M3 5h18l-7 8v6l-4-2v-4Z"/></svg>;
    case 'settings': return <svg {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>;

// -- date-range-picker.jsx --
// King's Guard date range picker — matches dashboard slate aesthetic.
// Quick presets in dropdown surface; "Custom range…" reveals two-month calendar
// using the same slate palette + amber accents as the rest of the dashboard.

const { useState: useStateDR, useEffect: useEffectDR, useRef: useRefDR } = React;

// Color tokens lifted from the rest of the dashboard
const DR = {
  // Topbar trigger (matches Dropdown component)
  trigBg: 'rgba(148,163,184,0.08)',
  trigBorder: 'rgba(148,163,184,0.12)',
  trigText: '#E2E8F0',
  trigMuted: '#94A3B8',
  // Dropdown surface (matches existing Dropdown popup)
  surface: '#1E293B',
  surfaceBorder: 'rgba(148,163,184,0.16)',
  divider: 'rgba(148,163,184,0.10)',
  itemHover: 'rgba(148,163,184,0.12)',
  itemSelected: 'rgba(148,163,184,0.16)',
  text: '#E2E8F0',
  textMuted: '#94A3B8',
  textDim: '#64748B',
  // Accent — amber, matching dashboard's neutral accent
  accent: '#F59E0B',
  accentSoft: 'rgba(245, 158, 11, 0.16)',
  accentSofter: 'rgba(245, 158, 11, 0.10)',
};

function fmtMonthYear(d) {
  return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function fmtShort(d) {
  if (!d) return '';
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric' });
}
function sameDay(a, b) {
  return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function diffDays(a, b) {
  return Math.round((b - a) / 86400000);
}

function DateRangePicker({ value, onChange, custom, onCustom, pageMode }) {
  const [open, setOpen] = useStateDR(false);
  const [picking, setPicking] = useStateDR(false);
  const [hoverDate, setHoverDate] = useStateDR(null);
  const [draft, setDraft] = useStateDR({ start: custom?.start || null, end: custom?.end || null });
  const today = new Date(2026, 4, 5); // app's "today"
  const [leftMonth, setLeftMonth] = useStateDR(new Date(today.getFullYear(), today.getMonth() - 1, 1));
  const ref = useRefDR(null);

  useEffectDR(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
        setPicking(false);
      }
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const presets = [
    { v: '7d', label: 'Last 7 days' },
    { v: '14d', label: 'Last 14 days' },
    { v: '30d', label: 'Last 30 days' },
    { v: 'ytd', label: 'Year to date' },
  ];

  const triggerLabel = (() => {
    if (value === 'custom' && custom?.start && custom?.end) {
      return `${fmtShort(custom.start)} – ${fmtShort(custom.end)}, ${custom.end.getFullYear()}`;
    }
    const p = presets.find(p => p.v === value);
    return p ? p.label : 'Last 7 days';
  })();

  const handlePreset = (v) => {
    onChange(v);
    setPicking(false);
    setOpen(false);
  };

  const handleDayClick = (d) => {
    if (!draft.start || (draft.start && draft.end)) {
      setDraft({ start: d, end: null });
    } else {
      if (d < draft.start) setDraft({ start: d, end: draft.start });
      else setDraft({ start: draft.start, end: d });
    }
  };

  const applyCustom = () => {
    if (draft.start && draft.end) {
      onCustom(draft);
      onChange('custom');
      setOpen(false);
      setPicking(false);
    }
  };

  if (pageMode) {
    const customActive = value === 'custom';
    const customLabel = customActive && custom?.start && custom?.end ? triggerLabel : 'Custom range…';
    return (
      <div ref={ref} style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
        {presets.map(p => {
          const active = value === p.v;
          return (
            <button key={p.v} onClick={() => handlePreset(p.v)} style={{
              padding: '5px 12px', borderRadius: 20,
              border: `1px solid ${active ? '#0F172A' : '#E2E8F0'}`,
              background: active ? '#0F172A' : '#FFFFFF',
              color: active ? '#FFFFFF' : '#64748B',
              fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
            }}
            onMouseEnter={e => { if (!active) { e.currentTarget.style.borderColor = '#CBD5E1'; e.currentTarget.style.color = '#334155'; } }}
            onMouseLeave={e => { if (!active) { e.currentTarget.style.borderColor = '#E2E8F0'; e.currentTarget.style.color = '#64748B'; } }}>
              {p.label}
            </button>
          );
        })}
        <button
          onClick={() => { setOpen(true); setPicking(true); setDraft({ start: custom?.start || null, end: custom?.end || null }); }}
          style={{
            padding: '5px 12px', borderRadius: 20,
            border: `1px solid ${customActive ? '#0F172A' : '#E2E8F0'}`,
            background: customActive ? '#0F172A' : '#FFFFFF',
            color: customActive ? '#FFFFFF' : '#64748B',
            fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
            display: 'inline-flex', alignItems: 'center', gap: 5,
          }}
          onMouseEnter={e => { if (!customActive) { e.currentTarget.style.borderColor = '#CBD5E1'; e.currentTarget.style.color = '#334155'; } }}
          onMouseLeave={e => { if (!customActive) { e.currentTarget.style.borderColor = '#E2E8F0'; e.currentTarget.style.color = '#64748B'; } }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          {customLabel}
        </button>
        {open && picking && (
          <div style={{
            position: 'absolute', top: 'calc(100% + 8px)', left: 0,
            background: DR.surface, border: `1px solid ${DR.surfaceBorder}`,
            borderRadius: 6, zIndex: 20,
            boxShadow: '0 10px 30px rgba(0,0,0,0.25)',
            fontFamily: 'inherit', width: 600,
          }}>
            <CalendarRange
              draft={draft}
              hoverDate={hoverDate}
              setHoverDate={setHoverDate}
              onDayClick={handleDayClick}
              leftMonth={leftMonth}
              setLeftMonth={setLeftMonth}
              today={today}
              onBack={null}
              onCancel={() => { setOpen(false); setPicking(false); }}
              onApply={applyCustom}
              canApply={draft.start && draft.end}
            />
          </div>
        )}
      </div>
    );
  }

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      {/* Trigger — same skin as the existing Dropdown component */}
      <button onClick={() => setOpen(!open)} style={{
        display: 'flex', alignItems: 'center', gap: 8,
        background: DR.trigBg, border: `1px solid ${DR.trigBorder}`,
        borderRadius: 6, padding: '6px 10px',
        color: DR.trigText, fontSize: 14, fontWeight: 500, cursor: 'pointer',
        fontFamily: 'inherit',
      }}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        {triggerLabel}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={DR.trigMuted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      {open && !picking && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0,
          background: DR.surface, border: `1px solid ${DR.surfaceBorder}`,
          borderRadius: 6, padding: 4, minWidth: 180, zIndex: 11,
          boxShadow: '0 10px 25px rgba(0,0,0,0.4)',
          fontFamily: 'inherit',
        }}>
          {presets.map(p => (
            <PresetItem key={p.v}
              selected={value === p.v}
              onClick={() => handlePreset(p.v)}
              label={p.label}
            />
          ))}
          <div style={{ height: 1, background: DR.divider, margin: '4px 0' }}></div>
          <PresetItem
            selected={value === 'custom'}
            onClick={() => { setPicking(true); setDraft({ start: custom?.start || null, end: custom?.end || null }); }}
            label="Custom range…"
            trailing={value === 'custom' && custom?.start && custom?.end
              ? `${fmtShort(custom.start)} – ${fmtShort(custom.end)}` : null}
          />
        </div>
      )}

      {open && picking && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0,
          background: DR.surface, border: `1px solid ${DR.surfaceBorder}`,
          borderRadius: 6, zIndex: 11,
          boxShadow: '0 10px 25px rgba(0,0,0,0.4)',
          fontFamily: 'inherit',
          width: 600,
        }}>
          <CalendarRange
            draft={draft}
            hoverDate={hoverDate}
            setHoverDate={setHoverDate}
            onDayClick={handleDayClick}
            leftMonth={leftMonth}
            setLeftMonth={setLeftMonth}
            today={today}
            onBack={() => setPicking(false)}
            onCancel={() => { setOpen(false); setPicking(false); }}
            onApply={applyCustom}
            canApply={draft.start && draft.end}
          />
        </div>
      )}
    </div>
  );
}

function PresetItem({ selected, onClick, label, trailing }) {
  return (
    <button onClick={onClick}
      style={{
        display: 'flex', alignItems: 'center', gap: 8,
        width: '100%', textAlign: 'left',
        padding: '7px 10px', borderRadius: 4, border: 'none',
        background: selected ? DR.itemSelected : 'transparent',
        color: DR.text, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit',
      }}
      onMouseEnter={e => { if (!selected) e.currentTarget.style.background = DR.itemHover; }}
      onMouseLeave={e => { e.currentTarget.style.background = selected ? DR.itemSelected : 'transparent'; }}
    >
      {/* Selection indicator — small amber dot like the dashboard's RiskDot pattern */}
      <span style={{
        width: 6, height: 6, borderRadius: '50%',
        background: selected ? DR.accent : 'transparent',
        flexShrink: 0,
      }}></span>
      <span style={{ flex: 1 }}>{label}</span>
      {trailing && <span style={{ fontSize: 13, color: DR.textMuted, fontFamily: "'Roboto Mono', monospace" }}>{trailing}</span>}
    </button>
  );
}

function CalendarRange({ draft, hoverDate, setHoverDate, onDayClick, leftMonth, setLeftMonth, today, onBack, onCancel, onApply, canApply }) {
  const rightMonth = new Date(leftMonth.getFullYear(), leftMonth.getMonth() + 1, 1);
  const start = draft.start;
  const end = draft.end || (start && hoverDate && hoverDate > start ? hoverDate : null);

  return (
    <div>
      {/* Header — date fields side-by-side, matches stat-card-style typography */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 12,
        padding: '10px 12px', borderBottom: `1px solid ${DR.divider}`,
      }}>
        {onBack ? (
          <button onClick={onBack} style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            background: 'transparent', border: 'none', color: DR.textMuted,
            fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
            padding: '4px 6px', borderRadius: 4,
          }}
          onMouseEnter={e => e.currentTarget.style.background = DR.itemHover}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Presets
          </button>
        ) : <div></div>}
        <div style={{ width: 1, height: 18, background: DR.divider }}></div>
        <DateChip label="Start" date={draft.start} active={!draft.start || (draft.start && draft.end)} />
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={DR.textMuted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        <DateChip label="End" date={draft.end} active={draft.start && !draft.end} />
        {draft.start && draft.end && (
          <span style={{
            marginLeft: 'auto',
            padding: '2px 7px', borderRadius: 4,
            background: DR.accentSoft, color: DR.accent,
            fontSize: 13, fontWeight: 700, fontFamily: "'Roboto Mono', monospace",
          }}>{diffDays(draft.start, draft.end) + 1}d</span>
        )}
      </div>

      {/* Two-month grid */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0, padding: '12px 4px 4px' }}>
        <CalendarMonth
          month={leftMonth}
          start={start} end={end}
          today={today}
          onDayClick={onDayClick}
          onDayHover={setHoverDate}
          onPrev={() => setLeftMonth(new Date(leftMonth.getFullYear(), leftMonth.getMonth() - 1, 1))}
          onNext={null}
          showPrev={true}
          showNext={false}
        />
        <CalendarMonth
          month={rightMonth}
          start={start} end={end}
          today={today}
          onDayClick={onDayClick}
          onDayHover={setHoverDate}
          onPrev={null}
          onNext={() => setLeftMonth(new Date(leftMonth.getFullYear(), leftMonth.getMonth() + 1, 1))}
          showPrev={false}
          showNext={true}
        />
      </div>

      {/* Action row — matches home.jsx btnPrimary / btnSecondary */}
      <div style={{
        display: 'flex', justifyContent: 'flex-end', gap: 8,
        padding: '10px 12px',
        borderTop: `1px solid ${DR.divider}`,
      }}>
        <button onClick={onCancel} style={{
          padding: '6px 12px', borderRadius: 6,
          background: 'transparent', color: DR.textMuted,
          border: `1px solid ${DR.divider}`,
          fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
        }}>Cancel</button>
        <button onClick={canApply ? onApply : undefined}
          disabled={!canApply}
          style={{
            padding: '6px 14px', borderRadius: 6, border: 'none',
            background: canApply ? DR.accent : DR.itemHover,
            color: canApply ? '#0F172A' : DR.textDim,
            fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
            cursor: canApply ? 'pointer' : 'default',
          }}>Apply range</button>
      </div>
    </div>
  );
}

function DateChip({ label, date, active }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 1,
      padding: '4px 10px', borderRadius: 4,
      background: active ? DR.accentSofter : 'transparent',
      border: `1px solid ${active ? DR.accent : DR.divider}`,
      minWidth: 120,
    }}>
      <span style={{ fontSize: 11, color: DR.textMuted, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>{label}</span>
      <span style={{ fontSize: 15, color: date ? DR.text : DR.textDim, fontWeight: 500, fontFamily: "'Roboto Mono', monospace", letterSpacing: '-0.01em' }}>
        {date ? date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '— — —'}
      </span>
    </div>
  );
}

function CalendarMonth({ month, start, end, today, onDayClick, onDayHover, onPrev, onNext, showPrev, showNext }) {
  const year = month.getFullYear();
  const m = month.getMonth();
  const firstDay = new Date(year, m, 1);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(year, m + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, m, d));
  while (cells.length % 7) cells.push(null);

  const dows = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  return (
    <div style={{ padding: '0 12px' }}>
      {/* Month header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '2px 0 8px' }}>
        {showPrev ? (
          <NavBtn onClick={onPrev} direction="left" />
        ) : <div style={{ width: 22 }}></div>}
        <div style={{ fontSize: 14, fontWeight: 600, color: DR.text, letterSpacing: '0.01em' }}>
          {fmtMonthYear(month)}
        </div>
        {showNext ? (
          <NavBtn onClick={onNext} direction="right" />
        ) : <div style={{ width: 22 }}></div>}
      </div>
      {/* Day-of-week row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginBottom: 2 }}>
        {dows.map((d, i) => (
          <div key={i} style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, color: DR.textDim, padding: '4px 0', letterSpacing: '0.04em' }}>{d}</div>
        ))}
      </div>
      {/* Day cells */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)' }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{ height: 30 }}></div>;
          const isStart = sameDay(d, start);
          const isEnd = sameDay(d, end);
          const inRange = start && end && d > start && d < end;
          const isFuture = d > today;
          const isToday = sameDay(d, today);
          const fillLeft = (inRange || isEnd) && start && end && !sameDay(start, end);
          const fillRight = (inRange || isStart) && start && end && !sameDay(start, end);
          return (
            <div key={i}
              onMouseEnter={() => onDayHover(d)} onMouseLeave={() => onDayHover(null)}
              style={{ height: 30, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {/* Range fill — flat amber-tinted bar (no rounded pill, matches dashboard) */}
              {fillLeft && (
                <div style={{ position: 'absolute', left: 0, top: 3, bottom: 3, width: '50%', background: DR.accentSofter }}></div>
              )}
              {fillRight && (
                <div style={{ position: 'absolute', right: 0, top: 3, bottom: 3, width: '50%', background: DR.accentSofter }}></div>
              )}
              <button
                onClick={isFuture ? undefined : () => onDayClick(d)}
                disabled={isFuture}
                style={{
                  position: 'relative', zIndex: 1,
                  width: 28, height: 26, borderRadius: 4, // 4px corners — matches dashboard pills/badges
                  border: isToday && !isStart && !isEnd ? `1px solid ${DR.accent}` : '1px solid transparent',
                  background: (isStart || isEnd) ? DR.accent : 'transparent',
                  color: (isStart || isEnd) ? '#0F172A' : (isFuture ? DR.textDim : DR.text),
                  fontSize: 14, fontWeight: (isStart || isEnd) ? 700 : 500,
                  fontFamily: "'Roboto Mono', monospace",
                  cursor: isFuture ? 'default' : 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  padding: 0,
                }}
                onMouseEnter={(e) => { if (!isFuture && !isStart && !isEnd) e.currentTarget.style.background = DR.itemHover; }}
                onMouseLeave={(e) => { if (!isStart && !isEnd) e.currentTarget.style.background = 'transparent'; }}
              >{d.getDate()}</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function NavBtn({ onClick, direction }) {
  return (
    <button onClick={onClick} style={{
      width: 22, height: 22, borderRadius: 4, border: 'none',
      background: 'transparent', color: DR.textMuted, cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}
    onMouseEnter={e => e.currentTarget.style.background = DR.itemHover}
    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {direction === 'left' ? <polyline points="15 18 9 12 15 6"></polyline> : <polyline points="9 18 15 12 9 6"></polyline>}
      </svg>
    </button>
  );
}

Object.assign(window, { DateRangePicker });

// Top bar + sidebar shell for King's Guard

const { useState } = React;

function TopBar({ brand, setBrand, country, setCountry, lastRefresh }) {
  const theme = getBrandTheme(brand);
  const isBrand = brand === 'betking' || brand === 'supersportbet';
  return (
    <div style={{

function SidebarCopilot({ brand, country, dateRange, theme }) {
  const [chatInput, setChatInput] = useState('');
  const [chatHistory, setChatHistory] = useState([]);
  const [chatLoading, setChatLoading] = useState(false);
  const chatScrollRef = React.useRef(null);
  const reqIdRef = React.useRef(0);

  // Reset thread when context changes
  React.useEffect(() => { setChatHistory([]); }, [brand, country, dateRange]);
  // Auto-scroll thread to bottom on new messages
  React.useEffect(() => {
    if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
  }, [chatHistory, chatLoading]);

  const brandLabel = brand === 'all' ? 'KingMakers Portfolio' : brand === 'betking' ? 'BetKing' : 'SuperSportBet';
  const countryLabel = country === 'ALL' ? 'all markets' : country === 'NG' ? 'Nigeria' : country === 'ZA' ? 'South Africa' : country === 'ZM' ? 'Zambia' : country;
  const rangeLabel = dateRange === '24h' ? 'last 24 hours' : dateRange === '7d' ? 'last 7 days' : dateRange === '14d' ? 'last 14 days' : dateRange === '30d' ? 'last 30 days' : dateRange === '90d' ? 'last 90 days' : 'custom range';

  const submit = (q) => {
    const trimmed = (q || '').trim();
    if (!trimmed || chatLoading) return;
    const reqId = ++reqIdRef.current;
    setChatHistory(h => [...h, { role: 'user', text: trimmed }]);
    setChatInput('');
    setChatLoading(true);

    const priorTurns = chatHistory.slice(-6).map(m =>
      `${m.role === 'user' ? 'Operator' : 'Copilot'}: ${m.text}`
    ).join('\n');

    const prompt = `You are RG Copilot, an internal AI analyst inside the King's Guard responsible-gambling platform at KingMakers. Your audience is the CS + RG operations team. Be calm, professional, operational. Respond in plain text — no markdown headers. You may use **bold** for one or two key phrases per response. Keep replies concise — 2 to 3 short sentences max unless the operator asks for a list, in which case use up to 4 short bullets prefixed with "- ".

LIVE CONTEXT:
- Operator: ${brandLabel} (${countryLabel})
- Time window: ${rangeLabel}
- Active workspace view: King's Guard dashboard with risk-distribution, deposit volume, top movers, signals, and outreach queue.

${priorTurns ? `PRIOR TURNS:\n${priorTurns}\n` : ''}OPERATOR QUESTION: ${trimmed}

Answer directly. If the question is outside RG operations, say so briefly. If actionable, end with one concrete next step (e.g. "open Player List filtered to high risk").`;

    window.claude.complete(prompt)
      .then(text => {
        if (reqIdRef.current !== reqId) return;
        setChatHistory(h => [...h, { role: 'assistant', text: (text || '').trim() }]);
        setChatLoading(false);
      })
      .catch(() => {
        if (reqIdRef.current !== reqId) return;
        setChatHistory(h => [...h, { role: 'assistant', text: 'Sorry — I could not reach the analysis service. Try again in a moment.' }]);
        setChatLoading(false);
      });
  };

  const samples = [
    "Where should I focus today?",
    "What's changed for VIPs?",
    "Spot recent risk spikes",
  ];

  const isEmpty = chatHistory.length === 0 && !chatLoading;

  return (
    <div style={{
      flex: 1, minHeight: 0,
      display: 'flex', flexDirection: 'column',
      borderRadius: 8, overflow: 'hidden',
      background: 'rgba(15,23,42,0.45)',
      border: '1px solid rgba(148,163,184,0.10)',
    }}>
      {/* Header */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 12px',
        borderBottom: '1px solid rgba(148,163,184,0.08)',
        flexShrink: 0,
      }}>
        <span style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: 18, height: 18, borderRadius: 4,
          background: 'linear-gradient(135deg, #6366F1, #4338CA)',
          color: '#FFFFFF', fontSize: 13, fontWeight: 700, lineHeight: 1,
        }}>★</span>
        <span style={{ fontSize: 13, fontWeight: 700, color: '#E2E8F0', textTransform: 'uppercase', letterSpacing: '0.08em' }}>King's Guard AI</span>
        <span style={{ marginLeft: 'auto', fontSize: 9.5, color: '#64748B', fontWeight: 500 }}>{rangeLabel}</span>
        {chatHistory.length > 0 && (
          <button onClick={() => { reqIdRef.current++; setChatHistory([]); setChatLoading(false); }} style={{
            background: 'transparent', border: 'none', color: '#64748B',
            fontSize: 9.5, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
            padding: '2px 4px', textTransform: 'uppercase', letterSpacing: '0.06em',
          }}>Clear</button>
        )}
      </div>

      {/* Thread */}
      <div ref={chatScrollRef} style={{
        flex: 1, minHeight: 0, overflowY: 'auto',
        padding: 10,
        display: 'flex', flexDirection: 'column', gap: 8,
      }}>
        {isEmpty && (
          <>
            <div style={{ fontSize: 13, color: '#94A3B8', lineHeight: 1.5, textWrap: 'pretty', padding: '4px 2px 8px' }}>
              I have live context on this view. Ask about risk, players, deposits, or trends.
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
              {samples.map((s, i) => (
                <button key={i} onClick={() => submit(s)} style={{
                  textAlign: 'left', padding: '7px 10px', borderRadius: 6,
                  background: 'rgba(148,163,184,0.06)',
                  border: '1px solid rgba(148,163,184,0.10)',
                  fontSize: 11.5, color: '#CBD5E1', fontWeight: 500,
                  cursor: 'pointer', fontFamily: 'inherit',
                  transition: 'background 120ms ease, border-color 120ms ease, color 120ms ease',
                }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(99,102,241,0.14)'; e.currentTarget.style.borderColor = 'rgba(99,102,241,0.40)'; e.currentTarget.style.color = '#E2E8F0'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(148,163,184,0.06)'; e.currentTarget.style.borderColor = 'rgba(148,163,184,0.10)'; e.currentTarget.style.color = '#CBD5E1'; }}
                >{s}</button>
              ))}
            </div>
          </>
        )}

        {chatHistory.map((m, i) => (
          <div key={i} style={{
            display: 'flex', flexDirection: 'column', gap: 3,
            alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
            maxWidth: '92%',
          }}>
            <div style={{
              fontSize: 10, color: '#64748B', fontWeight: 700, letterSpacing: '0.10em',
              textTransform: 'uppercase', textAlign: m.role === 'user' ? 'right' : 'left',
              padding: '0 2px',
            }}>{m.role === 'user' ? 'You' : 'Copilot'}</div>
            <div style={{
              fontSize: 11.5, lineHeight: 1.5,
              color: m.role === 'user' ? '#FFFFFF' : '#E2E8F0',
              background: m.role === 'user'
                ? 'linear-gradient(135deg, #6366F1, #4338CA)'
                : 'rgba(148,163,184,0.08)',
              border: m.role === 'user' ? 'none' : '1px solid rgba(148,163,184,0.10)',
              padding: '7px 10px', borderRadius: 7,
              textWrap: 'pretty', whiteSpace: 'pre-wrap',
            }}
              dangerouslySetInnerHTML={{ __html: m.text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#FFFFFF;font-weight:700">$1</strong>') }}
            ></div>
          </div>
        ))}
        {chatLoading && (
          <div style={{ alignSelf: 'flex-start', display: 'flex', alignItems: 'center', gap: 5, padding: '8px 10px', background: 'rgba(148,163,184,0.08)', border: '1px solid rgba(148,163,184,0.10)', borderRadius: 7 }}>
            <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#94A3B8', animation: 'kg-sb-pulse 1.2s ease-in-out infinite' }}></span>
            <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#94A3B8', animation: 'kg-sb-pulse 1.2s ease-in-out 0.2s infinite' }}></span>
            <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#94A3B8', animation: 'kg-sb-pulse 1.2s ease-in-out 0.4s infinite' }}></span>
          </div>
        )}
      </div>

      {/* Input pinned at bottom */}
      <form onSubmit={(e) => { e.preventDefault(); submit(chatInput); }} style={{
        display: 'flex', alignItems: 'center', gap: 4,
        padding: 8,
        borderTop: '1px solid rgba(148,163,184,0.08)',
        flexShrink: 0,
      }}>
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', gap: 4,
          background: 'rgba(15,23,42,0.7)',
          border: '1px solid rgba(148,163,184,0.18)',
          borderRadius: 6, padding: '2px 2px 2px 8px',
          transition: 'border-color 150ms ease, box-shadow 150ms ease',
        }}
          onFocus={(e) => { e.currentTarget.style.borderColor = 'rgba(99,102,241,0.55)'; e.currentTarget.style.boxShadow = '0 0 0 3px rgba(99,102,241,0.14)'; }}
          onBlur={(e) => { e.currentTarget.style.borderColor = 'rgba(148,163,184,0.18)'; e.currentTarget.style.boxShadow = 'none'; }}
        >
          <input
            type="text"
            value={chatInput}
            onChange={(e) => setChatInput(e.target.value)}
            placeholder="Ask anything…"
            disabled={chatLoading}
            style={{
              flex: 1, minWidth: 0, border: 'none', outline: 'none', background: 'transparent',
              fontSize: 14, color: '#E2E8F0', fontFamily: 'inherit', padding: '5px 0',
            }}
          />
          <button type="submit" disabled={chatLoading || !chatInput.trim()} style={{
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            width: 22, height: 22, borderRadius: 4, border: 'none', flexShrink: 0,
            background: chatInput.trim() && !chatLoading
              ? 'linear-gradient(135deg, #6366F1, #4338CA)'
              : 'rgba(148,163,184,0.18)',
            color: '#FFFFFF', fontSize: 13, fontWeight: 700,
            cursor: chatInput.trim() && !chatLoading ? 'pointer' : 'default',
            fontFamily: 'inherit',
          }}>↑</button>
        </div>
      </form>

      <style>{`
        @keyframes kg-sb-pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
      `}</style>
    </div>
  );
}

// Home Dashboard view for King's Guard

const { useMemo: useMemoHome } = React;

function HomeDashboard({ brand, country, dateRange, customRange, setDateRange, setCustomRange, onPlayerClick }) {
  const { PLAYERS, buildRangeData, MAU, MAU_TOTALS } = window.KGData;
  // Map 'custom' to nearest preset based on day count
  const effectiveRange = useMemoHome(() => {
    if (dateRange !== 'custom' || !customRange?.start || !customRange?.end) return dateRange || '7d';
    const days = Math.round((customRange.end - customRange.start) / 86400000) + 1;
    if (days <= 10) return '7d';
    if (days <= 22) return '14d';
    if (days <= 60) return '30d';
    if (days <= 120) return '90d';
    return 'ytd';
  }, [dateRange, customRange]);
  const rangeData = useMemoHome(() => buildRangeData(effectiveRange, brand), [effectiveRange, brand]);

  const filtered = PLAYERS.filter((p) =>
  (brand === 'all' || p.brand === brand) && (
  country === 'ALL' || p.country === country)
  );

  // Country-scoped MAU + distribution. Country filter scales totals proportionally.
  let countryShare = 1;
  if (brand === 'supersportbet' && country === 'ZA') countryShare = MAU.supersportbet.ZA / MAU_TOTALS.supersportbet;else
  if (brand === 'supersportbet' && country === 'ZM') countryShare = MAU.supersportbet.ZM / MAU_TOTALS.supersportbet;

  const dist = {
    high: Math.round(rangeData.dist.high * countryShare),
    med: Math.round(rangeData.dist.med * countryShare),
    low: Math.round(rangeData.dist.low * countryShare),
    unrated: Math.round(rangeData.dist.unrated * countryShare)
  };
  const total = dist.high + dist.med + dist.low + dist.unrated;
  const mau = Math.round(rangeData.mau * countryShare);
  const pct = (n) => (n / total * 100).toFixed(1);
  const sd = rangeData.statDeltas;
  const fmtMau = (n) => n >= 1000000 ? (n / 1000000).toFixed(1) + 'M' : n >= 1000 ? Math.round(n / 1000) + 'k' : n.toLocaleString();

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Page header */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 4 }}>
        <div>
          <div style={{ fontSize: 13, color: '#64748B', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 4 }}>
            {brand === 'all' ? 'KingMakers Portfolio' : BRAND_ACCENTS[brand].name} · {COUNTRY_NAMES[country] || country}
          </div>
          <h1 style={{ fontSize: 25, fontWeight: 600, color: '#0F172A', margin: 0, letterSpacing: '-0.01em' }}>Guardian Dashboard

          </h1>
          <p style={{ fontSize: 15, color: '#64748B', margin: '4px 0 0' }}>
            {fmtMau(mau)} {rangeData.activeUnitFull} · {total.toLocaleString()} risk-monitored over the last {rangeData.rangeLabel} · {rangeData.refreshLabel} batch refresh
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={btnSecondary}>
            <Icon name="export" size={14} /> Export
          </button>
          <button style={btnPrimary}>
            <Icon name="refresh" size={14} /> Refresh data
          </button>
        </div>
      </div>

      {/* Inline date range picker */}
      <DateRangePicker
        value={dateRange}
        onChange={setDateRange}
        custom={customRange}
        onCustom={setCustomRange}
        pageMode
      />

      {/* Top stat row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12 }}>
        <StatCard
          label="Active base"
          value={fmtMau(mau)}
          subtext={`${mau.toLocaleString()} ${rangeData.activeUnit}`}
          delta=""
          tone="unrated" />

        <StatCard
          label="High risk"
          value={dist.high.toLocaleString()}
          subtext={`${pct(dist.high)}% of base`}
          delta={`${sd.high} ${sd.dailyVs}`}
          deltaUp
          tone="high" />

        <StatCard
          label="Medium risk"
          value={dist.med.toLocaleString()}
          subtext={`${pct(dist.med)}% of base`}
          delta={`${sd.med} ${sd.dailyVs}`}
          deltaUp
          tone="medium" />

        <StatCard

function RiskTrendCard({ data, rangeLabel, growth }) {
  const [view, setView] = React.useState('overview');
  const W = 720;
  const H = 200;
  const PAD_L = 40,PAD_B = 28,PAD_T = 12,PAD_R = 12;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const max = Math.max(...data.map((d) => d.high + d.med + d.low));
  const niceMax = Math.ceil(max / 1000) * 1000;
  const xStep = innerW / (data.length - 1);

  const series = ['low', 'med', 'high'];
  const colors = { low: '#16A34A', med: '#D97706', high: '#DC2626' };

  // Stacked area
  const areas = {};
  series.forEach((s, idx) => {
    const points = data.map((d, i) => {
      const stack = series.slice(0, idx + 1).reduce((sum, ss) => sum + d[ss], 0);
      const y = PAD_T + innerH - stack / niceMax * innerH;
      const x = PAD_L + i * xStep;
      return [x, y];
    });
    const prevPoints = idx === 0 ?
    data.map((_, i) => [PAD_L + i * xStep, PAD_T + innerH]) :
    data.map((d, i) => {
      const stack = series.slice(0, idx).reduce((sum, ss) => sum + d[ss], 0);
      const y = PAD_T + innerH - stack / niceMax * innerH;
      return [PAD_L + i * xStep, y];
    });
    const path = points.map((p, i) => i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`).join(' ') +
    ' ' + prevPoints.slice().reverse().map((p) => `L${p[0]},${p[1]}`).join(' ') + 'Z';
    const linePath = points.map((p, i) => i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`).join(' ');
    areas[s] = { path, linePath, color: colors[s] };
  });

  // Per-tier mini sparkline
  const TierSparkline = ({ bucket, label, color, fullWidth }) => {
    const vals = data.map(d => d[bucket]);
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
    const SW = fullWidth ? 720 : 200, SH = fullWidth ? 180 : 56, PL = 40, PB = fullWidth ? 26 : 16, PT = fullWidth ? 10 : 4, PR = 8;
    const iW = SW - PL - PR, iH = SH - PT - PB;
    const xs = iW / (vals.length - 1);
    const pts = vals.map((v, i) => [PL + i * xs, PT + iH - ((v - mn) / rng) * iH]);
    const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const area = line + ` L${pts[pts.length-1][0].toFixed(1)},${PT+iH} L${PL},${PT+iH} Z`;
    const cur = vals[vals.length - 1];
    const pct = ((cur - vals[0]) / (vals[0] || 1) * 100).toFixed(1);
    const up = cur >= vals[0];
    const fmt = v => v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(1)+'k' : v;
    return (
      <div style={{ flex: 1, minWidth: 0, padding: '10px 12px 8px', borderRadius: 6, border: `1px solid ${color}20`, background: `${color}05`, display: fullWidth ? 'flex' : undefined, flexDirection: fullWidth ? 'column' : undefined }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4, flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: color }}></span>
            <span style={{ fontSize: 12, fontWeight: 700, color: '#475569', textTransform: 'uppercase', letterSpacing: '0.07em' }}>{label}</span>
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, color: up ? color : '#16A34A' }}>{up ? '↑' : '↓'}{Math.abs(pct)}%</span>
        </div>
        <div style={{ fontSize: 20, fontWeight: 700, color: '#0F172A', fontFamily: "'Roboto Mono', monospace", letterSpacing: '-0.02em', lineHeight: 1, marginBottom: 4, flexShrink: 0 }}>
          {fmt(cur)}
        </div>
        {fullWidth ? (
          <div style={{ flex: 1, position: 'relative', minHeight: 80 }}>
            <svg viewBox={`0 0 ${SW} ${SH}`} width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style={{ display: 'block', position: 'absolute', inset: 0 }}>
              {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
                const v = Math.round(mn + (mx - mn) * (1 - t));
                const y = PT + iH - ((v - mn) / rng) * iH;
                return <g key={i}>
                  <line x1={PL} y1={y} x2={SW-PR} y2={y} stroke={`${color}18`} strokeWidth="1"/>
                  <text x={PL-3} y={y+3} fontSize="12" textAnchor="end" fill="#94A3B8" fontFamily="'Roboto Mono', monospace">{fmt(v)}</text>
                </g>;
              })}
              <path d={area} fill={color} fillOpacity="0.10"/>
              <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color} stroke="#fff" strokeWidth="1.5"/>
              {data.map((d, i) => <text key={i} x={pts[i][0]} y={SH-4} fontSize="12" textAnchor="middle" fill="#94A3B8">{d.d}</text>)}
            </svg>
          </div>
        ) : (
          <svg viewBox={`0 0 ${SW} ${SH}`} width="100%" style={{ display: 'block', overflow: 'visible' }}>
            {[0, 1].map((t, i) => {
              const v = Math.round(mn + (mx - mn) * (1 - t));
              const y = PT + iH - ((v - mn) / rng) * iH;
              return <g key={i}>
                <line x1={PL} y1={y} x2={SW-PR} y2={y} stroke={`${color}18`} strokeWidth="1" strokeDasharray="3 3"/>
                <text x={PL-3} y={y+3} fontSize="10" textAnchor="end" fill="#94A3B8" fontFamily="'Roboto Mono', monospace">{fmt(v)}</text>
              </g>;
            })}
            <path d={area} fill={color} fillOpacity="0.10"/>
            <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color} stroke="#fff" strokeWidth="1.5"/>
            {[0, data.length-1].map(i => <text key={i} x={pts[i][0]} y={SH-1} fontSize="10" textAnchor={i===0?'start':'end'} fill="#CBD5E1">{data[i].d}</text>)}
          </svg>
        )}
      </div>
    );
  };

  return (
    <div style={{ ...cardStyle, display: 'flex', flexDirection: 'column' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexShrink: 0 }}>
        <div>
          <div style={{ fontSize: 13, color: '#64748B', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600, marginBottom: 2 }}>Risk distribution trend · {rangeLabel}</div>
          <div style={{ fontSize: 16, color: '#0F172A', fontWeight: 600 }}>How risk is moving across the player base</div>
        </div>
        <div style={{ display: 'flex', background: '#F1F5F9', borderRadius: 6, padding: 2, gap: 2 }}>
          {[
            ['overview', 'Overview', null],
            ['high',     'High',     '#DC2626'],
            ['med',      'Medium',   '#D97706'],
            ['low',      'Low',      '#16A34A'],
          ].map(([id, label, dot]) => (
            <button key={id} onClick={() => setView(id)} style={{
              padding: '4px 10px', borderRadius: 4, border: 'none', fontSize: 13, fontWeight: 600,
              background: view === id ? '#FFFFFF' : 'transparent',
              color: view === id ? '#0F172A' : '#64748B',
              boxShadow: view === id ? '0 1px 3px rgba(15,23,42,0.10)' : 'none',
              cursor: 'pointer', fontFamily: 'inherit',
              display: 'inline-flex', alignItems: 'center', gap: 5,
            }}>
              {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: dot, flexShrink: 0 }}></span>}
              {label}
            </button>
          ))}
        </div>
      </div>

      {view === 'overview' && <>
        <div style={{ display: 'flex', gap: 14, fontSize: 13, marginBottom: 10, flexShrink: 0 }}>
          {[['High', '#DC2626', ''], ['Medium', '#D97706', ''], ['Low', '#16A34A', '5 3']].map(([l, c, dash]) =>
            <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 5, color: '#475569', fontWeight: 500 }}>
              <svg width="18" height="10" style={{ flexShrink: 0 }}>
                <line x1="0" y1="5" x2="18" y2="5" stroke={c} strokeWidth="2.5" strokeDasharray={dash || 'none'} />
              </svg>
              {l}
            </div>
          )}
        </div>
        <div style={{ flex: 1, position: 'relative', minHeight: 120 }}>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style={{ display: 'block', position: 'absolute', inset: 0 }}>
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
              const y = PAD_T + innerH * t;
              const v = Math.round(niceMax * (1 - t));
              return (
                <g key={i}>
                  <line x1={PAD_L} y1={y} x2={W - PAD_R} y2={y} stroke="#F1F5F9" strokeWidth="1" />
                  <text x={PAD_L - 6} y={y + 3} fontSize="12" textAnchor="end" fill="#94A3B8" fontFamily="'Roboto Mono', monospace">
                    {v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v}
                  </text>
                </g>);
            })}
            {[
              { s: 'low',  color: '#16A34A', dash: '5 3' },
              { s: 'med',  color: '#D97706', dash: ''    },
              { s: 'high', color: '#DC2626', dash: ''    },
            ].map(({ s, color, dash }) => {
              const pts = data.map((d, i) => [
                PAD_L + i * xStep,
                PAD_T + innerH - (d[s] / niceMax) * innerH,
              ]);
              const linePath = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
              const last = pts[pts.length - 1];
              return (
                <g key={s}>
                  <path d={linePath} fill="none" stroke={color} strokeWidth="1.8"
                    strokeDasharray={dash || 'none'} strokeLinecap="round" strokeLinejoin="round" />
                  <circle cx={last[0]} cy={last[1]} r="3" fill={color} stroke="#fff" strokeWidth="1.5" />
                </g>
              );
            })}
            {data.map((d, i) =>
              <text key={i} x={PAD_L + i * xStep} y={H - 8} fontSize="12" textAnchor="middle" fill="#94A3B8">
                {d.d}
              </text>
            )}
          </svg>
        </div>
      </>}

      {view === 'high' && <TierSparkline bucket="high" label="High risk"   color="#DC2626" fullWidth />}
      {view === 'med'  && <TierSparkline bucket="med"  label="Medium risk" color="#D97706" fullWidth />}
      {view === 'low'  && <TierSparkline bucket="low"  label="Low risk"    color="#16A34A" fullWidth />}
    </div>);

}

function RGCopilotCard({ brand, country, rangeLabel, dist, total, mau, sd, rangeData }) {
  const [insights, setInsights] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(false);
  const [regen, setRegen] = React.useState(0);
  const [riskFilter, setRiskFilter] = React.useState(null); // null | 'high' | 'medium' | 'low'
  const reqIdRef = React.useRef(0);

  const brandLabel = brand === 'all' ? 'KingMakers Portfolio' :
  brand === 'betking' ? 'BetKing' :
  'SuperSportBet';
  const countryLabel = country === 'ALL' ? 'all markets' :
  country === 'NG' ? 'Nigeria' :
  country === 'ZA' ? 'South Africa' :
  country === 'ZM' ? 'Zambia' : country;

  React.useEffect(() => {
    const reqId = ++reqIdRef.current;
    setLoading(true);
    setError(false);

    const pct = (n) => (n / total * 100).toFixed(1);
    const depositTotal = brand === 'supersportbet' ? rangeData.depositTotalSS : rangeData.depositTotal;
    const topSignals = (rangeData.signals || []).slice(0, 3).map((s) => `${s.label} ${s.share}%`).join(', ');
    const topMover = (rangeData.movers || [])[0];

    const filterDirective = riskFilter ?
    `\nFOCUS FILTER: Generate callouts SPECIFICALLY about ${riskFilter}-risk players (${riskFilter === 'high' ? 'score 80+, escalation candidates' : riskFilter === 'medium' ? 'score 50–79, monitor & nudge' : 'score <50, healthy but watch for upward migration'}). All 5 callouts must address this segment — patterns within it, notable movers into/out of it, deposit & session signals from it, recommended actions for the team. Do not pivot to other risk levels unless directly comparing.` :
    '';

    const prompt = `You are an internal Responsible Gambling analyst writing a daily morning brief for the King's Guard platform at KingMakers. Your audience is the CS + RG operations team.

Generate exactly 5 short callouts tailored to the time window "${rangeLabel}" and these live numbers:

- Operator: ${brandLabel} (${countryLabel})
- Active base: ${mau.toLocaleString()} ${rangeData.activeUnitFull}
- Risk-monitored: ${total.toLocaleString()}
- High risk: ${dist.high.toLocaleString()} (${pct(dist.high)}%) — ${sd.high} ${sd.dailyVs}
- Medium risk: ${dist.med.toLocaleString()} (${pct(dist.med)}%) — ${sd.med} ${sd.dailyVs}
- Low risk: ${dist.low.toLocaleString()} (${pct(dist.low)}%) — ${sd.low} ${sd.dailyVs}
- Insufficient data: ${dist.unrated.toLocaleString()} (${pct(dist.unrated)}%)
- Deposit volume ${rangeLabel}: ${depositTotal.toLocaleString()} (${rangeData.depositGrowth}% ${rangeData.deltaLabel})
- Risk-trend growth: ${rangeData.trendGrowthPct}% ${rangeLabel}
- Top signals driving alerts: ${topSignals}
${topMover ? `- Notable mover: ${topMover.id} risk score now ${topMover.riskScore} (was ${topMover.riskFrom}); insight "${topMover.insight}"` : ''}${filterDirective}

Each callout MUST:
- Start with a 2-4 word punchy title in **bold markdown** followed by a colon, then a single sentence ≤ 22 words.
- Anchor to the ${rangeLabel} window — say "this week", "over the last 30 days", "quarter-to-date", etc. as appropriate.
- Reference at least one specific number from the data above.
- Suggest a concrete next action OR call out a pattern worth investigating.

Tone: calm, professional, operational. No emojis. No preamble. No closing summary. Output exactly 5 bullets, each on its own line, prefixed with "- ".`;

    window.claude.complete(prompt).
    then((text) => {
      if (reqIdRef.current !== reqId) return;
      const lines = text.split('\n').map((l) => l.trim()).filter((l) => l.startsWith('-') || l.startsWith('•'));
      const parsed = lines.slice(0, 5).map((l) => l.replace(/^[-•]\s*/, ''));
      if (parsed.length === 0) {
        setError(true);
      } else {
        setInsights(parsed);
      }
      setLoading(false);
    }).
    catch(() => {
      if (reqIdRef.current !== reqId) return;
      setError(true);
      setLoading(false);
    });
  }, [brand, country, rangeLabel, dist.high, dist.med, dist.low, dist.unrated, mau, regen, riskFilter]);

  // Render bold-then-colon-then-text
  const renderInsight = (txt) => {
    const m = txt.match(/^\*\*(.+?)\*\*\s*:?\s*(.*)$/);
    if (m) return { title: m[1].replace(/[.:]+$/, ''), body: m[2] };
    return { title: null, body: txt };
  };

  const tones = [
  { bar: '#DC2626', tag: 'rgba(220,38,38,0.08)', tagText: '#B91C1C', label: 'Risk' },
  { bar: '#D97706', tag: 'rgba(217,119,6,0.08)', tagText: '#B45309', label: 'Pattern' },
  { bar: '#0891B2', tag: 'rgba(8,145,178,0.08)', tagText: '#0E7490', label: 'Trend' },
  { bar: '#16A34A', tag: 'rgba(22,163,74,0.08)', tagText: '#15803D', label: 'Signal' },
  { bar: '#4338CA', tag: 'rgba(99,102,241,0.10)', tagText: '#4338CA', label: 'Action' }];


  return (
