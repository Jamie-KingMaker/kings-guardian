<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>King's Guard — RG Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F1F5F9; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", "Segoe UI", Roboto, sans-serif; color: #0F172A; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.5); border: 2px solid transparent; background-clip: padding-box; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
window.claude = {
  complete: function(prompt) {
    var sets = {
      high: [
        '**Escalation wave building:** 47 players crossed the 80+ score threshold this period, a 12% rise — prioritise outreach queue review.',
        '**Chasing-loss pattern spiking:** 14 high-risk players re-deposited within 10 minutes of a losing session, up 31% vs prior period.',
        '**VIP crossover concern:** 3 Tier 8–9 customers have entered the high-risk bucket this week — flag for account manager review.',
        '**Re-deposit velocity critical:** Average gap between loss and next deposit is now 6 minutes among high-risk cohort, down from 22 minutes.',
        '**Outreach queue overdue:** 9 high-risk players have been flagged for outreach but remain uncontacted for more than 72 hours.'
      ],
      medium: [
        '**Medium tier turbulence:** Net inflow of 306 players into the medium bucket this period, driven by late-night activity shifts.',
        '**Sports → Casino migration:** 89 medium-risk players switched primary product this week — a leading indicator of escalation.',
        '**Burst deposit cluster:** 41 medium-risk accounts show 3+ deposits within 30 minutes in at least one session this period.',
        '**Late-night sessions rising:** 58% of medium-risk bets placed between 22:00 and 03:00, up from 34% in the prior period.',
        '**Self-exclusion enquiries up:** 12 medium-risk players contacted support this week — consider proactive limit nudge for the cohort.'
      ],
      low: [
        '**Low-risk base holding steady:** Population stable with only 0.3% net drift toward medium tier — no systemic concern this period.',
        '**Recreational pattern intact:** Average session length among low-risk players is 24 minutes, consistent with healthy leisure behaviour.',
        '**Deposit limit uptake strong:** 18% of low-risk players have an active deposit limit set, the highest rate across all risk tiers.',
        '**Early-signal monitoring clear:** Fewer than 0.4% of low-risk accounts triggered a behavioural flag this period — within normal range.',
        '**Small upward migration noted:** 198 low-risk players migrated to medium this period — monitor for continuation next refresh cycle.'
      ],
      all: [
        '**High-risk spike detected:** 47 players crossed the 80+ threshold this week, up 12% vs prior period — review outreach queue.',
        '**Deposit velocity rising:** Total deposits up 18.3% over the last 7 days, driven by late-night sessions after 22:00.',
        '**Medium cohort stable:** Medium-risk population held steady at 8,241, with a slight downward drift of 34 players this week.',
        '**RG tool adoption up:** Deposit limits set by 312 players this week, a 22% increase — soft intervention nudges are working.',
        '**Attention queue growing:** 6 flagged players remain unactioned for over 48 hours — open Player List filtered to outreach status.'
      ]
    };
    var filter = 'all';
    if (prompt.indexOf('FOCUS FILTER') !== -1) {
      if (prompt.indexOf('high-risk players') !== -1) filter = 'high';
      else if (prompt.indexOf('medium-risk players') !== -1) filter = 'medium';
      else if (prompt.indexOf('low-risk players') !== -1) filter = 'low';
    }
    return Promise.resolve(sets[filter].map(function(s) { return '- ' + s; }).join('\n'));
  }
};
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx?v=2"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="date-range-picker.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="home.jsx?v=4"></script>
<script type="text/babel" src="player-list.jsx"></script>
<script type="text/babel" src="player-detail.jsx"></script>
<script type="text/babel" src="population-risk.jsx"></script>
<script type="text/babel" src="interaction-log.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "showSpeakerNotes": false
}/*EDITMODE-END*/;

function App() {
  const [brand, setBrand] = useState('betking');
  const [country, setCountry] = useState('NG');
  const [dateRange, setDateRange] = useState('7d');
  const [customRange, setCustomRange] = useState(null);
  const [activeView, setActiveView] = useState('home');
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Sync country with brand
  useEffect(() => {
    if (brand === 'betking' && country !== 'NG' && country !== 'ALL') setCountry('NG');
    if (brand === 'supersportbet' && country === 'NG') setCountry('ZA');
  }, [brand]);

  const handlePlayerClick = (id) => {
    setSelectedPlayer(id);
    setActiveView('player-detail');
  };

  let body;
  if (activeView === 'home') {
    body = <HomeDashboard brand={brand} country={country} dateRange={dateRange} setDateRange={setDateRange} customRange={customRange} setCustomRange={setCustomRange} onPlayerClick={handlePlayerClick} />;
  } else if (activeView === 'players') {
    body = <PlayerList brand={brand} country={country} range={dateRange} onPlayerClick={handlePlayerClick} />;
  } else if (activeView === 'player-detail') {
    body = <PlayerDetail playerId={selectedPlayer} onBack={() => setActiveView('players')} />;
  } else if (activeView === 'population') {
    body = <PopulationRisk brand={brand} country={country} dateRange={dateRange} />;
  } else if (activeView === 'log') {
    body = <InteractionLog brand={brand} country={country} onPlayerClick={handlePlayerClick} />;
  } else {
    body = (
      <div style={{ padding: 24 }}>
        <div style={{ ...cardStyle, padding: 40, textAlign: 'center', color: '#94A3B8' }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: '#475569', marginBottom: 6 }}>{activeView.charAt(0).toUpperCase() + activeView.slice(1)}</div>
          <div style={{ fontSize: 12 }}>Section scaffolded — primary working screens are <strong>Dashboard</strong> and <strong>Player List</strong>.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar brand={brand} setBrand={setBrand} country={country} setCountry={setCountry} dateRange={dateRange} setDateRange={setDateRange} customRange={customRange} setCustomRange={setCustomRange} lastRefresh="3h ago" />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar activeView={activeView === 'player-detail' ? 'players' : activeView} setActiveView={(v) => { setActiveView(v); setSelectedPlayer(null); }} brand={brand} country={country} dateRange={dateRange} />
        <div style={{ flex: 1, overflow: 'auto', background: '#F1F5F9' }}>
          {body}
        </div>
      </div>

      <TweaksPanel title="King's Guard tweaks">
        <TweakSection title="View">
          <TweakRadio label="Active screen" value={activeView === 'player-detail' ? 'players' : activeView} onChange={(v) => { setActiveView(v); setSelectedPlayer(null); }} options={[
            { value: 'home', label: 'Dashboard' },
            { value: 'players', label: 'Player list' },
          ]} />
          <TweakButton onClick={() => handlePlayerClick('BK-4827193')}>Open sample player profile →</TweakButton>
        </TweakSection>
        <TweakSection title="Brand & market">
          <TweakRadio label="Brand" value={brand} onChange={setBrand} options={[
            { value: 'betking', label: 'BetKing' },
            { value: 'supersportbet', label: 'SuperSportBet' },
          ]} />
          <TweakSelect label="Country" value={country} onChange={setCountry} options={[
            { value: 'ALL', label: 'All markets' },
            { value: 'NG', label: 'Nigeria' },
            { value: 'ZA', label: 'South Africa' },
            { value: 'ZM', label: 'Zambia' },
          ]} />
          <TweakSelect label="Date range" value={dateRange} onChange={setDateRange} options={[
            { value: '7d', label: 'Last 7 days' },
            { value: '14d', label: 'Last 14 days' },
            { value: '30d', label: 'Last 30 days' },
          ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
